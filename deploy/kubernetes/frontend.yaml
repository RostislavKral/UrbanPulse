apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: urbanpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: urbanpulse
    spec:
      containers:
        - name: frontend
          image: urbanpulse/frontend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: urbanpulse-config
          ports:
            - name: http
              containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: urbanpulse
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 5173
      targetPort: http
