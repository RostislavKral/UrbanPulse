apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api
  labels:
    app.kubernetes.io/name: data-api
    app.kubernetes.io/part-of: urbanpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-api
        app.kubernetes.io/part-of: urbanpulse
    spec:
      containers:
        - name: data-api
          image: urbanpulse/data-service:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: urbanpulse-config
            - secretRef:
                name: urbanpulse-secrets
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: data-api
  labels:
    app.kubernetes.io/name: data-api
    app.kubernetes.io/part-of: urbanpulse
spec:
  selector:
    app.kubernetes.io/name: data-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-worker
  labels:
    app.kubernetes.io/name: data-worker
    app.kubernetes.io/part-of: urbanpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-worker
        app.kubernetes.io/part-of: urbanpulse
    spec:
      containers:
        - name: data-worker
          image: urbanpulse/data-service:latest
          imagePullPolicy: IfNotPresent
          command: ["python"]
          args: ["logger.py"]
          envFrom:
            - configMapRef:
                name: urbanpulse-config
            - secretRef:
                name: urbanpulse-secrets
