apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
  labels:
    app.kubernetes.io/name: realtime-gateway
    app.kubernetes.io/part-of: urbanpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-gateway
        app.kubernetes.io/part-of: urbanpulse
    spec:
      containers:
        - name: realtime-gateway
          image: urbanpulse/realtime-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: urbanpulse-config
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway
  labels:
    app.kubernetes.io/name: realtime-gateway
    app.kubernetes.io/part-of: urbanpulse
spec:
  selector:
    app.kubernetes.io/name: realtime-gateway
  ports:
    - name: http
      port: 3000
      targetPort: http
