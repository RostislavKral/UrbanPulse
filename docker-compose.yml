services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command:
      [
        "sh",
        "-lc",
        "if [ \"$(ls -1 /sys/class/net | wc -l)\" -le 1 ]; then echo 'redis: no network interface (only loopback); exiting so Docker restarts it'; exit 1; fi; exec redis-server"
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "[ \"$(ls -1 /sys/class/net | wc -l)\" -gt 1 ] && redis-cli ping | grep -q PONG"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - urban-pulse
  timescaledb:
      image: timescale/timescaledb-ha:pg14-latest
      container_name: prague_db
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER:-admin}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
        POSTGRES_DB: ${POSTGRES_DB:-prague_transport}
      ports:
        - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
      volumes:
        - ./db/init:/docker-entrypoint-initdb.d:ro
      networks:
        - urban-pulse

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      restart: always
      environment:
        PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
        PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?set PGADMIN_DEFAULT_PASSWORD in .env}
      ports:
        - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
      depends_on:
        - timescaledb
      networks:
        - urban-pulse


  data-service:
    build:
      context: ./apps/data-service
    depends_on:
      - redis
    environment:
      - GOLEMIO_API_KEY=${GOLEMIO_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_DB=${POSTGRES_DB:-prague_transport}
    networks:
      - urban-pulse

  realtime-gateway:
    build:
      context: ./apps/realtime-gateway
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    networks:
      - urban-pulse

  frontend:
    build:
      context: ./apps/frontend
    depends_on:
      - realtime-gateway
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=${VITE_WS_URL:-ws://127.0.0.1:${GATEWAY_PORT:-3000}/ws}
    networks:
      - urban-pulse

networks:
  urban-pulse:
    driver: bridge
