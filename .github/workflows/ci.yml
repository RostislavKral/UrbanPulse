name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  realtime-gateway:
    name: Realtime gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/realtime-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/realtime-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  python:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/data-service/requirements.txt
            ml/requirements.txt

      - name: Install data service dependencies
        run: python -m pip install -r apps/data-service/requirements.txt

      - name: Check Python syntax
        run: python -m py_compile apps/data-service/*.py ml/scripts/*.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - realtime-gateway
      - python
    env:
      GOLEMIO_API_KEY: dummy
      POSTGRES_PASSWORD: dummy
      PGADMIN_DEFAULT_PASSWORD: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Build service images
        run: docker compose build frontend realtime-gateway data-api
