name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  realtime-gateway:
    name: Realtime gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/realtime-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/realtime-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/data-service/requirements.txt
            ml/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Audit dependencies
        continue-on-error: true
        run: python -m pip_audit -r apps/data-service/requirements.txt

      - name: Lint
        run: python -m ruff check apps/data-service ml/scripts tests/python

      - name: Test
        run: python -m pytest

      - name: Check Python syntax
        run: python -m py_compile apps/data-service/*.py ml/scripts/*.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - realtime-gateway
      - python
    env:
      COMPOSE_PROJECT_NAME: urbanpulse
      GOLEMIO_API_KEY: dummy
      POSTGRES_PASSWORD: dummy
      PGADMIN_DEFAULT_PASSWORD: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Build service images
        run: docker compose build frontend realtime-gateway data-api

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: urbanpulse-frontend:latest
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy realtime gateway image scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: urbanpulse-realtime-gateway:latest
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy data service image scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: urbanpulse-data-api:latest
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
