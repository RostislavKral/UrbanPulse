[tool.pytest.ini_options]
pythonpath = ["apps/data-service"]
testpaths = ["tests/python"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  "apps/data-service/.venv",
  "ml/.venv",
  "ml/data",
  "ml/models",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
